<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Auto Market - ကားအရောင်းအဝယ်</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans pb-20">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-30">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🚗 Myanmar Auto Market</h1>
            <span id="header-subtitle" class="text-xs bg-blue-700 px-2.5 py-1 rounded-full font-medium">Explore FYP</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- Welcome Banner (Feed only) -->
        <div id="welcome-banner" class="bg-white p-4 rounded-lg shadow">
            <h2 class="text-lg font-semibold text-gray-800">Welcome! ကြိုဆိုပါတယ်</h2>
            <p class="text-sm text-gray-600">The most Burmese-friendly car marketplace platform.</p>
        </div>

        <!-- Car Listing Form Section (Dashboard Modal/Tab Style) -->
        <section id="form-section" class="bg-white p-6 rounded-lg shadow-md hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-heading" class="text-xl font-bold text-gray-800">🚗 Sell Your Car</h2>
                <button type="button" id="cancel-edit-btn" onclick="triggerHaptic(); switchTab('feed')" class="hidden text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300 font-semibold">Cancel</button>
            </div>
            
            <form id="car-form" class="space-y-4">
                <input type="hidden" id="edit-listing-id" value="">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Brand (Type)</label>
                    <input type="text" id="car-brand" placeholder="e.g., Toyota, Honda..." required class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Car Name / Model (Type)</label>
                    <input type="text" id="car-title" placeholder="e.g., Crown Athlete, Probox..." required class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Model Year (Type)</label>
                        <input type="text" id="car-year" placeholder="e.g., 2004" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Color (Type)</label>
                        <input type="text" id="car-color" placeholder="e.g., Pearl White" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Made in (Select)</label>
                        <select id="car-country" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm bg-white">
                            <option value="Japan">Japan</option>
                            <option value="Thailand">Thailand</option>
                            <option value="China">China</option>
                            <option value="USA">USA</option>
                            <option value="Germany">Germany</option>
                            <option value="South Korea">South Korea</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Mileage (Optional)</label>
                        <input type="text" id="car-mileage" placeholder="e.g., 85,000 km" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Price (USD / MMK)</label>
                    <input type="text" id="car-price" placeholder="e.g., $15,000 or 15000" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>

                <!-- Contact Information Section -->
                <div class="border-t pt-3 space-y-3">
                    <label class="block text-sm font-bold text-gray-800">📱 Contact Info (Fill at least one)</label>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Phone Number</label>
                        <input type="text" id="car-phone" placeholder="e.g., 09-912345678" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Viber Number</label>
                        <input type="text" id="car-viber" placeholder="e.g., 09-912345678" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Telegram Username / Number</label>
                        <input type="text" id="car-telegram" placeholder="e.g., @username or phone" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                </div>

                <div class="border-t pt-3">
                    <label class="block text-sm font-medium text-gray-700">Manage Photos (Up to 20)</label>
                    <div id="current-images-preview" class="flex flex-wrap gap-2 my-2"></div>

                    <input type="file" id="car-images" accept="image/*" multiple class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <p class="text-xs text-gray-500 mt-1">Remove unwanted pictures above, or select new files to add more.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="car-desc" rows="3" placeholder="Condition, license details..." class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></textarea>
                </div>
                <button type="submit" id="form-submit-btn" onclick="triggerHaptic()" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700">Post Listing</button>
            </form>
        </section>

        <!-- Search & Filter Section -->
        <section id="search-section" class="bg-white p-4 rounded-lg shadow-md space-y-3">
            <input type="text" id="search-input" placeholder="🔍 General Search (e.g., Crown, Toyota)..." class="w-full p-2 border border-gray-300 rounded-md text-sm">
            
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="filter-brand" placeholder="Filter by Brand..." class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                <select id="filter-country" onchange="triggerHaptic()" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Countries</option>
                    <option value="Japan">Japan</option>
                    <option value="Thailand">Thailand</option>
                    <option value="China">China</option>
                    <option value="USA">USA</option>
                    <option value="Germany">Germany</option>
                    <option value="South Korea">South Korea</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </section>

        <!-- Marketplace Feed Section -->
        <section class="space-y-4">
            <h2 id="feed-title" class="text-xl font-bold text-gray-800">📋 Available Cars (FYP)</h2>
            <div id="listings-container" class="space-y-4">
                <!-- Dynamic listings will appear here -->
            </div>
        </section>
    </main>

    <!-- Professional App Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40">
        <div class="max-w-md mx-auto grid grid-cols-3 h-16">
            <button onclick="triggerHaptic(); switchTab('feed')" id="nav-btn-feed" class="flex flex-col items-center justify-center text-blue-600 font-bold transition">
                <span class="text-xl">🏠</span>
                <span class="text-xs mt-0.5">Feed</span>
            </button>
            <button onclick="triggerHaptic(); switchTab('sell')" id="nav-btn-sell" class="flex flex-col items-center justify-center text-gray-400 font-medium hover:text-gray-600 transition">
                <span class="text-xl">➕</span>
                <span class="text-xs mt-0.5">Sell Car</span>
            </button>
            <button onclick="triggerHaptic(); switchTab('saved')" id="nav-btn-saved" class="flex flex-col items-center justify-center text-gray-400 font-medium hover:text-gray-600 transition relative">
                <span class="text-xl">❤️</span>
                <span class="text-xs mt-0.5">Saved <span id="nav-badge" class="text-[10px]"></span></span>
            </button>
        </div>
    </nav>

    <script>
        let currentTab = 'feed'; // 'feed', 'sell', 'saved'
        let activeEditImages = [];

        function triggerHaptic() {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            } else {
                try {
                    let switchInput = document.createElement('input');
                    switchInput.type = 'checkbox';
                    switchInput.style.display = 'none';
                    document.body.appendChild(switchInput);
                    switchInput.click();
                    switchInput.remove();
                } catch(e) {}
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchTab('feed');
            updateWishlistCount();
            renderImagePreviews();
        });

        function switchTab(tab) {
            currentTab = tab;
            
            const formSection = document.getElementById('form-section');
            const searchSection = document.getElementById('search-section');
            const welcomeBanner = document.getElementById('welcome-banner');
            const feedTitle = document.getElementById('feed-title');
            const headerSubtitle = document.getElementById('header-subtitle');

            // Reset navigation tab visual highlights
            document.getElementById('nav-btn-feed').className = "flex flex-col items-center justify-center text-gray-400 font-medium transition";
            document.getElementById('nav-btn-sell').className = "flex flex-col items-center justify-center text-gray-400 font-medium transition";
            document.getElementById('nav-btn-saved').className = "flex flex-col items-center justify-center text-gray-400 font-medium transition";

            if (tab === 'feed') {
                document.getElementById('nav-btn-feed').className = "flex flex-col items-center justify-center text-blue-600 font-bold transition";
                formSection.classList.add('hidden');
                searchSection.classList.remove('hidden');
                welcomeBanner.classList.remove('hidden');
                feedTitle.innerText = "📋 Available Cars (FYP)";
                headerSubtitle.innerText = "Explore FYP";
                loadListings(false);
            } else if (tab === 'sell') {
                document.getElementById('nav-btn-sell').className = "flex flex-col items-center justify-center text-blue-600 font-bold transition";
                formSection.classList.remove('hidden');
                searchSection.classList.add('hidden');
                welcomeBanner.classList.add('hidden');
                feedTitle.innerText = "🚗 Manage Your Listing";
                headerSubtitle.innerText = "Post / Edit Mode";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (tab === 'saved') {
                document.getElementById('nav-btn-saved').className = "flex flex-col items-center justify-center text-blue-600 font-bold transition";
                formSection.classList.add('hidden');
                searchSection.classList.add('hidden');
                welcomeBanner.classList.add('hidden');
                feedTitle.innerText = "❤️ Your Saved Cars";
                headerSubtitle.innerText = "Wishlist";
                loadListings(true);
            }
            updateWishlistCount();
        }

        document.getElementById('car-form').addEventListener('submit', function(e) {
            e.preventDefault();
            triggerHaptic();
            
            const phone = document.getElementById('car-phone').value.trim();
            const viber = document.getElementById('car-viber').value.trim();
            const telegram = document.getElementById('car-telegram').value.trim();

            if (!phone && !viber && !telegram) {
                alert('Please provide at least one contact method (Phone, Viber, or Telegram).');
                return;
            }

            const editId = document.getElementById('edit-listing-id').value;
            const brand = document.getElementById('car-brand').value.trim();
            const title = document.getElementById('car-title').value.trim();
            const year = document.getElementById('car-year').value.trim();
            const color = document.getElementById('car-color').value.trim();
            const country = document.getElementById('car-country').value;
            const mileage = document.getElementById('car-mileage').value.trim();
            const price = document.getElementById('car-price').value.trim();
            const desc = document.getElementById('car-desc').value.trim();
            const imageInput = document.getElementById('car-images');

            let listings = JSON.parse(localStorage.getItem('carListings')) || [];

            if (imageInput.files && imageInput.files.length > 0) {
                const files = Array.from(imageInput.files).slice(0, 20);
                let loadedCount = 0;
                let newTempImages = [];

                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        newTempImages[index] = e.target.result;
                        loadedCount++;
                        if (loadedCount === files.length) {
                            const combinedImages = [...activeEditImages, ...newTempImages];
                            saveListingData(editId, listings, { brand, title, year, color, country, mileage, price, contacts: { phone, viber, telegram }, desc, imgSrcs: combinedImages });
                        }
                    }
                    reader.readAsDataURL(file);
                });
            } else {
                const finalImages = activeEditImages.length > 0 ? activeEditImages : ['https://via.placeholder.com/400x200?text=No+Image'];
                saveListingData(editId, listings, { brand, title, year, color, country, mileage, price, contacts: { phone, viber, telegram }, desc, imgSrcs: finalImages });
            }
        });

        function saveListingData(editId, listings, carData) {
            if (editId) {
                let existingItem = listings.find(l => l.id == editId);
                if (!existingItem) return;

                existingItem.brand = carData.brand;
                existingItem.title = carData.title;
                existingItem.year = carData.year;
                existingItem.color = carData.color;
                existingItem.country = carData.country;
                existingItem.mileage = carData.mileage;
                existingItem.price = carData.price;
                existingItem.contacts = carData.contacts;
                existingItem.desc = carData.desc;
                existingItem.imgSrcs = carData.imgSrcs;
            } else {
                const newListing = { id: Date.now(), ...carData };
                listings.unshift(newListing);
            }
            finalizeSave(listings);
        }

        function finalizeSave(listings) {
            localStorage.setItem('carListings', JSON.stringify(listings));
            cancelEdit();
            switchTab('feed');
            alert('Listing saved successfully!');
        }

        function editListing(id) {
            triggerHaptic();
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            let item = listings.find(l => l.id == id);
            if (!item) return;

            switchTab('sell');

            document.getElementById('edit-listing-id').value = item.id;
            document.getElementById('car-brand').value = item.brand || '';
            document.getElementById('car-title').value = item.title || '';
            document.getElementById('car-year').value = item.year || '';
            document.getElementById('car-color').value = item.color || '';
            document.getElementById('car-country').value = item.country || 'Japan';
            document.getElementById('car-mileage').value = item.mileage || '';
            document.getElementById('car-price').value = item.price || '';
            document.getElementById('car-phone').value = item.contacts ? (item.contacts.phone || '') : '';
            document.getElementById('car-viber').value = item.contacts ? (item.contacts.viber || '') : '';
            document.getElementById('car-telegram').value = item.contacts ? (item.contacts.telegram || '') : '';
            document.getElementById('car-desc').value = item.desc || '';

            activeEditImages = item.imgSrcs ? [...item.imgSrcs] : [];
            renderImagePreviews();

            document.getElementById('form-heading').innerText = '✏️ Edit Your Car Listing';
            document.getElementById('form-submit-btn').innerText = 'Update Listing';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
        }

        function renderImagePreviews() {
            const container = document.getElementById('current-images-preview');
            container.innerHTML = '';
            if (activeEditImages.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400">No images loaded. Upload or add some photos below.</span>';
                return;
            }
            activeEditImages.forEach((src, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = "relative inline-block";
                wrapper.innerHTML = `
                    <img src="${src}" class="w-16 h-16 object-cover rounded-md border border-gray-300">
                    <button type="button" onclick="triggerHaptic(); removeActiveImage(${idx})" class="absolute -top-1.5 -right-1.5 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow cursor-pointer">✕</button>
                `;
                container.appendChild(wrapper);
            });
        }

        window.removeActiveImage = function(index) {
            activeEditImages.splice(index, 1);
            renderImagePreviews();
        }

        function cancelEdit() {
            document.getElementById('car-form').reset();
            document.getElementById('edit-listing-id').value = '';
            activeEditImages = [];
            renderImagePreviews();
            document.getElementById('form-heading').innerText = '🚗 Sell Your Car';
            document.getElementById('form-submit-btn').innerText = 'Post Listing';
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        function loadListings(favoritesOnly = false) {
            const container = document.getElementById('listings-container');
            container.innerHTML = '';
            
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];

            if (favoritesOnly) {
                listings = listings.filter(item => favorites.includes(item.id));
            }

            const query = document.getElementById('search-input').value.toLowerCase();
            const filterBrandInput = document.getElementById('filter-brand').value.toLowerCase();
            const selectedCountry = document.getElementById('filter-country').value;

            const filtered = listings.filter(item => {
                const combinedText = `${item.brand || ''} ${item.title || ''} ${item.year || ''} ${item.color || ''}`.toLowerCase();
                const matchesQuery = combinedText.includes(query);
                
                const matchesBrand = !filterBrandInput || (item.brand && item.brand.toLowerCase().includes(filterBrandInput));
                const matchesCountry = !selectedCountry || item.country === selectedCountry;

                return matchesQuery && matchesBrand && matchesCountry;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-500 text-center py-4">${favoritesOnly ? 'No saved cars yet.' : 'No cars found matching your criteria.'}</p>`;
                return;
            }

            filtered.forEach(item => {
                const isFav = favorites.includes(item.id);
                const images = item.imgSrcs || [item.imgSrc || 'https://via.placeholder.com/400x200?text=No+Image'];
                
                let contactsHtml = '<div class="space-y-1.5 pt-1">';
                if (item.contacts) {
                    if (item.contacts.phone) {
                        contactsHtml += `<a href="tel:${item.contacts.phone}" onclick="triggerHaptic()" class="block w-full bg-blue-50 text-blue-700 text-center text-sm font-semibold py-1.5 rounded-md border border-blue-200 hover:bg-blue-100">📞 Call: ${item.contacts.phone}</a>`;
                    }
                    if (item.contacts.viber) {
                        contactsHtml += `<a href="viber://chat?number=${item.contacts.viber}" onclick="triggerHaptic()" class="block w-full bg-purple-50 text-purple-700 text-center text-sm font-semibold py-1.5 rounded-md border border-purple-200 hover:bg-purple-100">🟣 Viber: ${item.contacts.viber}</a>`;
                    }
                    if (item.contacts.telegram) {
                        let tgLink = item.contacts.telegram.startsWith('@') ? `https://t.me/${item.contacts.telegram.substring(1)}` : `https://t.me/${item.contacts.telegram}`;
                        contactsHtml += `<a href="${tgLink}" target="_blank" onclick="triggerHaptic()" class="block w-full bg-sky-50 text-sky-700 text-center text-sm font-semibold py-1.5 rounded-md border border-sky-200 hover:bg-sky-100">✈️ Telegram: ${item.contacts.telegram}</a>`;
                    }
                }
                contactsHtml += '</div>';

                let mileageHtml = item.mileage ? ` | 🛣️ ${item.mileage}` : '';

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-lg shadow-md space-y-2 relative";
                
                let carouselHtml = `
                    <div class="relative overflow-hidden rounded-md bg-black">
                        <img id="img-${item.id}" src="${images[0]}" class="w-full h-48 object-cover">
                        <button onclick="triggerHaptic(); toggleFavorite(${item.id})" class="absolute top-2 right-2 bg-white p-2 rounded-full shadow-md text-lg hover:scale-110 transition z-10">
                            ${isFav ? '❤️' : '🤍'}
                        </button>
                `;

                if (images.length > 1) {
                    carouselHtml += `
                        <div class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-0.5 rounded-md">
                            <span id="counter-${item.id}">1</span> / ${images.length}
                        </div>
                        <button onclick="triggerHaptic(); changeSlide(${item.id}, -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 text-white px-2 py-1 rounded-full text-sm hover:bg-black">‹</button>
                        <button onclick="triggerHaptic(); changeSlide(${item.id}, 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 text-white px-2 py-1 rounded-full text-sm hover:bg-black">›</button>
                    `;
                }
                carouselHtml += `</div>`;

                card.innerHTML = `
                    ${carouselHtml}
                    <h3 class="text-lg font-bold text-gray-800">${item.brand || ''} ${item.title || ''} (${item.year || ''})</h3>
                    <p class="text-xs text-gray-500">🎨 Color: <span class="font-semibold text-gray-700">${item.color || 'N/A'}</span>${mileageHtml} | 🌐 Made in: <span class="font-semibold text-gray-700">${item.country || 'Japan'}</span></p>
                    <p class="text-blue-600 font-semibold text-lg">${item.price}</p>
                    <p class="text-sm text-gray-600">${item.desc}</p>
                    ${contactsHtml}
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <button onclick="editListing(${item.id})" class="bg-gray-100 text-gray-700 text-sm font-semibold py-2 rounded-md hover:bg-gray-200">✏️ Edit</button>
                        <button onclick="deleteListing(${item.id})" class="bg-red-100 text-red-600 text-sm font-semibold py-2 rounded-md hover:bg-red-200">🗑️ Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.changeSlide = function(id, direction) {
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            let item = listings.find(l => l.id === id);
            if (!item || !item.imgSrcs || item.imgSrcs.length <= 1) return;

            let imgElement = document.getElementById(`img-${id}`);
            let counterElement = document.getElementById(`counter-${id}`);
            
            let currentImages = item.imgSrcs;
            let currentSrc = imgElement.src;
            let currentIndex = currentImages.indexOf(currentSrc);

            let newIndex = currentIndex + direction;
            if (newIndex >= currentImages.length) newIndex = 0;
            if (newIndex < 0) newIndex = currentImages.length - 1;

            imgElement.src = currentImages[newIndex];
            if (counterElement) counterElement.innerText = newIndex + 1;
        }

        function toggleFavorite(id) {
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('carFavorites', JSON.stringify(favorites));
            loadListings(currentTab === 'saved');
            updateWishlistCount();
        }

        function updateWishlistCount() {
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            const badge = document.getElementById('nav-badge');
            if (favorites.length > 0) {
                badge.innerText = `(${favorites.length})`;
            } else {
                badge.innerText = '';
            }
        }

        function deleteListing(id) {
            triggerHaptic();
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            listings = listings.filter(item => item.id !== id);
            localStorage.setItem('carListings', JSON.stringify(listings));
            
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            favorites = favorites.filter(favId => favId !== id);
            localStorage.setItem('carFavorites', JSON.stringify(favorites));

            loadListings(currentTab === 'saved');
            updateWishlistCount();
        }

        document.getElementById('search-input').addEventListener('input', () => loadListings(false));
        document.getElementById('filter-brand').addEventListener('input', () => loadListings(false));
        document.getElementById('filter-country').addEventListener('change', () => loadListings(false));
    </script>
</body>
</html>
