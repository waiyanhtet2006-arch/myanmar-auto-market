<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Auto Market - ကားအရောင်းအဝယ်</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans">
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🚗 Myanmar Auto Market</h1>
            <button onclick="toggleView()" id="view-toggle-btn" class="text-sm bg-blue-700 px-3 py-1.5 rounded-md font-semibold hover:bg-blue-800">❤️ Saved (0)</button>
        </div>
    </header>
    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <h2 class="text-lg font-semibold text-gray-800">Welcome! ကြိုဆိုပါတယ်</h2>
            <p class="text-sm text-gray-600">The most Burmese-friendly car marketplace platform.</p>
        </div>

        <!-- Car Listing Form Section -->
        <section id="form-section" class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 text-gray-800">🚗 Sell Your Car</h2>
            <form id="car-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Car Make & Model</label>
                    <input type="text" id="car-title" placeholder="e.g., Toyota Crown" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Brand</label>
                        <select id="car-brand" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm bg-white">
                            <option value="Toyota">Toyota</option>
                            <option value="Honda">Honda</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Mazda">Mazda</option>
                            <option value="Suzuki">Suzuki</option>
                            <option value="Mitsubishi">Mitsubishi</option>
                            <option value="Isuzu">Isuzu</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Kia">Kia</option>
                            <option value="Lexus">Lexus</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="BMW">BMW</option>
                            <option value="Ford">Ford</option>
                            <option value="Chevrolet">Chevrolet</option>
                            <option value="Daihatsu">Daihatsu</option>
                            <option value="Subaru">Subaru</option>
                            <option value="MG">MG</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Year (1980-2026)</label>
                        <input type="number" id="car-year" min="1980" max="2026" placeholder="2018" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Country Made</label>
                    <select id="car-country" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm bg-white">
                        <option value="Japan">Japan</option>
                        <option value="Thailand">Thailand</option>
                        <option value="China">China</option>
                        <option value="USA">USA</option>
                        <option value="Germany">Germany</option>
                        <option value="South Korea">South Korea</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Price (USD / MMK)</label>
                    <input type="text" id="car-price" placeholder="e.g., $15,000" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>

                <!-- Contact Information Section -->
                <div class="border-t pt-3 space-y-3">
                    <label class="block text-sm font-bold text-gray-800">📱 Contact Info (Fill at least one)</label>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Phone Number</label>
                        <input type="text" id="car-phone" placeholder="e.g., 09-912345678" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Viber Number</label>
                        <input type="text" id="car-viber" placeholder="e.g., 09-912345678" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Telegram Username / Number</label>
                        <input type="text" id="car-telegram" placeholder="e.g., @username or phone" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm">
                    </div>
                </div>

                <div class="border-t pt-3">
                    <label class="block text-sm font-medium text-gray-700">Upload Photos (Up to 20)</label>
                    <input type="file" id="car-images" accept="image/*" multiple class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <p class="text-xs text-gray-500 mt-1">Hold Ctrl / Shift to select multiple photos.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="car-desc" rows="3" placeholder="Condition, mileage..." class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700">Post Listing</button>
            </form>
        </section>

        <!-- Search & Advanced Filter Section -->
        <section id="search-section" class="bg-white p-4 rounded-lg shadow-md space-y-3">
            <input type="text" id="search-input" placeholder="🔍 General Search (e.g., Crown, Probox)..." class="w-full p-2 border border-gray-300 rounded-md text-sm">
            
            <div class="grid grid-cols-3 gap-2">
                <select id="filter-brand" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Brands</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Honda">Honda</option>
                    <option value="Nissan">Nissan</option>
                    <option value="Mazda">Mazda</option>
                    <option value="Suzuki">Suzuki</option>
                    <option value="Mitsubishi">Mitsubishi</option>
                    <option value="Isuzu">Isuzu</option>
                    <option value="Hyundai">Hyundai</option>
                    <option value="Kia">Kia</option>
                    <option value="Lexus">Lexus</option>
                    <option value="Mercedes-Benz">Mercedes-Benz</option>
                    <option value="BMW">BMW</option>
                    <option value="Ford">Ford</option>
                    <option value="Chevrolet">Chevrolet</option>
                    <option value="Daihatsu">Daihatsu</option>
                    <option value="Subaru">Subaru</option>
                    <option value="MG">MG</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-country" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Countries</option>
                    <option value="Japan">Japan</option>
                    <option value="Thailand">Thailand</option>
                    <option value="China">China</option>
                    <option value="USA">USA</option>
                    <option value="Germany">Germany</option>
                    <option value="South Korea">South Korea</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-year" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Years</option>
                    <option value="2020-2026">2020 - 2026</option>
                    <option value="2010-2019">2010 - 2019</option>
                    <option value="2000-2009">2000 - 2009</option>
                    <option value="1980-1999">1980 - 1999</option>
                </select>
            </div>
        </section>

        <!-- Marketplace Feed Section -->
        <section class="space-y-4">
            <h2 id="feed-title" class="text-xl font-bold text-gray-800">📋 Available Cars</h2>
            <div id="listings-container" class="space-y-4">
                <!-- Dynamic listings will appear here -->
            </div>
        </section>
    </main>

    <script>
        let showFavoritesOnly = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadListings();
            updateWishlistCount();
        });

        document.getElementById('car-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('car-phone').value.trim();
            const viber = document.getElementById('car-viber').value.trim();
            const telegram = document.getElementById('car-telegram').value.trim();

            if (!phone && !viber && !telegram) {
                alert('Please provide at least one contact method (Phone, Viber, or Telegram).');
                return;
            }

            const title = document.getElementById('car-title').value;
            const brand = document.getElementById('car-brand').value;
            const year = document.getElementById('car-year').value;
            const country = document.getElementById('car-country').value;
            const price = document.getElementById('car-price').value;
            const desc = document.getElementById('car-desc').value;
            const imageInput = document.getElementById('car-images');

            let imageSrcs = ['https://via.placeholder.com/400x200?text=No+Image'];

            if (imageInput.files && imageInput.files.length > 0) {
                const files = Array.from(imageInput.files).slice(0, 20); // Limit to 20 files max
                let loadedCount = 0;
                let tempImages = [];

                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        tempImages[index] = e.target.result;
                        loadedCount++;
                        if (loadedCount === files.length) {
                            saveListing(title, brand, year, country, price, { phone, viber, telegram }, desc, tempImages);
                        }
                    }
                    reader.readAsDataURL(file);
                });
            } else {
                saveListing(title, brand, year, country, price, { phone, viber, telegram }, desc, imageSrcs);
            }
        });

        function saveListing(title, brand, year, country, price, contacts, desc, imgSrcs) {
            const newListing = { id: Date.now(), title, brand, year, country, price, contacts, desc, imgSrcs };
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            listings.unshift(newListing);
            localStorage.setItem('carListings', JSON.stringify(listings));

            document.getElementById('car-form').reset();
            loadListings();
            alert('Listing posted successfully!');
        }

        function loadListings() {
            const container = document.getElementById('listings-container');
            container.innerHTML = '';
            
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];

            if (showFavoritesOnly) {
                listings = listings.filter(item => favorites.includes(item.id));
            }

            const query = document.getElementById('search-input').value.toLowerCase();
            const selectedBrand = document.getElementById('filter-brand').value;
            const selectedCountry = document.getElementById('filter-country').value;
            const selectedYearRange = document.getElementById('filter-year').value;

            const filtered = listings.filter(item => {
                const matchesQuery = item.title.toLowerCase().includes(query) || 
                                     item.brand.toLowerCase().includes(query) || 
                                     item.country.toLowerCase().includes(query);
                
                const matchesBrand = !selectedBrand || item.brand === selectedBrand;
                const matchesCountry = !selectedCountry || item.country === selectedCountry;
                
                let matchesYear = true;
                if (selectedYearRange) {
                    const [minY, maxY] = selectedYearRange.split('-').map(Number);
                    matchesYear = Number(item.year) >= minY && Number(item.year) <= maxY;
                }

                return matchesQuery && matchesBrand && matchesCountry && matchesYear;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-500 text-center py-4">${showFavoritesOnly ? 'No saved cars yet.' : 'No cars found matching your criteria.'}</p>`;
                return;
            }

            filtered.forEach(item => {
                const isFav = favorites.includes(item.id);
                // Handle backward compatibility if listing has older single 'imgSrc' format
                const images = item.imgSrcs || [item.imgSrc || 'https://via.placeholder.com/400x200?text=No+Image'];
                
                let contactsHtml = '<div class="space-y-1.5 pt-1">';
                if (item.contacts) {
                    if (item.contacts.phone) {
                        contactsHtml += `<a href="tel:${item.contacts.phone}" class="block w-full bg-blue-50 text-blue-700 text-center text-sm font-semibold py-1.5 rounded-md border border-blue-200 hover:bg-blue-100">📞 Call: ${item.contacts.phone}</a>`;
                    }
                    if (item.contacts.viber) {
                        contactsHtml += `<a href="viber://chat?number=${item.contacts.viber}" class="block w-full bg-purple-50 text-purple-700 text-center text-sm font-semibold py-1.5 rounded-md border border-purple-200 hover:bg-purple-100">🟣 Viber: ${item.contacts.viber}</a>`;
                    }
                    if (item.contacts.telegram) {
                        let tgLink = item.contacts.telegram.startsWith('@') ? `https://t.me/${item.contacts.telegram.substring(1)}` : `https://t.me/${item.contacts.telegram}`;
                        contactsHtml += `<a href="${tgLink}" target="_blank" class="block w-full bg-sky-50 text-sky-700 text-center text-sm font-semibold py-1.5 rounded-md border border-sky-200 hover:bg-sky-100">✈️ Telegram: ${item.contacts.telegram}</a>`;
                    }
                }
                contactsHtml += '</div>';

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-lg shadow-md space-y-2 relative";
                
                // Construct carousel markup
                let carouselHtml = `
                    <div class="relative overflow-hidden rounded-md bg-black">
                        <img id="img-${item.id}" src="${images[0]}" class="w-full h-48 object-cover">
                        <button onclick="toggleFavorite(${item.id})" class="absolute top-2 right-2 bg-white p-2 rounded-full shadow-md text-lg hover:scale-110 transition z-10">
                            ${isFav ? '❤️' : '🤍'}
                        </button>
                `;

                if (images.length > 1) {
                    carouselHtml += `
                        <div class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-0.5 rounded-md">
                            <span id="counter-${item.id}">1</span> / ${images.length}
                        </div>
                        <button onclick="changeSlide(${item.id}, -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 text-white px-2 py-1 rounded-full text-sm hover:bg-black">‹</button>
                        <button onclick="changeSlide(${item.id}, 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 text-white px-2 py-1 rounded-full text-sm hover:bg-black">›</button>
                    `;
                }
                carouselHtml += `</div>`;

                card.innerHTML = `
                    ${carouselHtml}
                    <h3 class="text-lg font-bold text-gray-800">${item.title} (${item.year})</h3>
                    <p class="text-xs text-gray-500">🏭 Brand: <span class="font-semibold text-gray-700">${item.brand}</span> | 🌐 Made in: <span class="font-semibold text-gray-700">${item.country}</span></p>
                    <p class="text-blue-600 font-semibold text-lg">${item.price}</p>
                    <p class="text-sm text-gray-600">${item.desc}</p>
                    ${contactsHtml}
                    <button onclick="deleteListing(${item.id})" class="w-full bg-red-100 text-red-600 text-sm font-semibold py-2 rounded-md hover:bg-red-200 mt-2">🗑️ Mark as Sold / Delete</button>
                `;
                
                // Store image collection on element data or manage globally
                card.dataset.images = JSON.stringify(images);
                card.dataset.currentIndex = 0;
                container.appendChild(card);
            });
        }

        // Image Carousel Slider Function
        window.changeSlide = function(id, direction) {
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            let item = listings.find(l => l.id === id);
            if (!item || !item.imgSrcs || item.imgSrcs.length <= 1) return;

            // Find current index attribute or manage via DOM state
            let imgElement = document.getElementById(`img-${id}`);
            let counterElement = document.getElementById(`counter-${id}`);
            
            let currentImages = item.imgSrcs;
            let currentSrc = imgElement.src;
            let currentIndex = currentImages.indexOf(currentSrc);

            let newIndex = currentIndex + direction;
            if (newIndex >= currentImages.length) newIndex = 0;
            if (newIndex < 0) newIndex = currentImages.length - 1;

            imgElement.src = currentImages[newIndex];
            if (counterElement) counterElement.innerText = newIndex + 1;
        }

        function toggleFavorite(id) {
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('carFavorites', JSON.stringify(favorites));
            loadListings();
            updateWishlistCount();
        }

        function updateWishlistCount() {
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            document.getElementById('view-toggle-btn').innerText = showFavoritesOnly ? '📋 All Cars' : `❤️ Saved (${favorites.length})`;
        }

        function toggleView() {
            showFavoritesOnly = !showFavoritesOnly;
            document.getElementById('form-section').style.display = showFavoritesOnly ? 'none' : 'block';
            document.getElementById('search-section').style.display = showFavoritesOnly ? 'none' : 'block';
            document.getElementById('feed-title').innerText = showFavoritesOnly ? '❤️ Your Saved Cars' : '📋 Available Cars';
            loadListings();
            updateWishlistCount();
        }

        function deleteListing(id) {
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            listings = listings.filter(item => item.id !== id);
            localStorage.setItem('carListings', JSON.stringify(listings));
            
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            favorites = favorites.filter(favId => favId !== id);
            localStorage.setItem('carFavorites', JSON.stringify(favorites));

            loadListings();
            updateWishlistCount();
        }

        document.getElementById('search-input').addEventListener('input', loadListings);
        document.getElementById('filter-brand').addEventListener('change', loadListings);
        document.getElementById('filter-country').addEventListener('change', loadListings);
        document.getElementById('filter-year').addEventListener('change', loadListings);
    </script>
</body>
</html>
