<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Auto Market - ကားအရောင်းအဝယ်</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans pb-24">
    <!-- Premium Header -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 text-white p-4 sticky top-0 z-30 shadow-xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-300 bg-clip-text text-transparent">🚗 Auto Market</h1>
                <span id="header-subtitle" class="text-[10px] text-slate-400 font-semibold tracking-wide mt-0.5">LIVE CLOUD</span>
            </div>
            <!-- Auth Container -->
            <div id="auth-container" class="flex items-center gap-2">
                <!-- Buttons injected via JS -->
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- Welcome Banner -->
        <div id="welcome-banner" class="bg-gradient-to-br from-slate-900 to-slate-900/50 border border-slate-800/80 p-5 rounded-2xl shadow-lg">
            <h2 class="text-base font-bold text-white tracking-tight">Welcome! ကြိုဆိုပါတယ်</h2>
            <p class="text-xs text-slate-400 mt-1 leading-relaxed">The premier cloud-synced automobile marketplace in Myanmar.</p>
        </div>

        <!-- User Dashboard / Profile Section -->
        <section id="dashboard-section" class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl hidden space-y-4">
            <div class="flex items-center gap-4 pb-4 border-b border-slate-800">
                <div id="profile-avatar-container" class="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-xl font-bold text-white shadow-lg overflow-hidden border-2 border-slate-700">
                    👤
                </div>
                <div>
                    <h2 id="profile-name" class="text-base font-bold text-white">Guest User</h2>
                    <p id="profile-email" class="text-xs text-slate-400">Not signed in</p>
                    <span class="inline-block mt-1 text-[10px] bg-blue-600/20 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full font-semibold">Verified Seller</span>
                </div>
            </div>

            <!-- Showroom / Account Name Editor -->
            <div class="bg-slate-950 border border-slate-800 p-3.5 rounded-xl space-y-2">
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider">🏢 Showroom / Account Name</label>
                <div class="flex gap-2">
                    <input type="text" id="showroom-name-input" placeholder="e.g., Royal Auto Showroom" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    <button onclick="triggerHaptic(); saveShowroomName()" id="save-showroom-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow-sm">Save</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="bg-slate-950 border border-slate-800 p-3 rounded-xl">
                    <span id="stat-posts-count" class="text-lg font-bold text-blue-400">0</span>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider mt-0.5 font-semibold">Your Listings</p>
                </div>
                <div class="bg-slate-950 border border-slate-800 p-3 rounded-xl">
                    <span id="stat-saved-count" class="text-lg font-bold text-indigo-400">0</span>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider mt-0.5 font-semibold">Saved Wishlist</p>
                </div>
            </div>

            <div class="pt-2 flex gap-2">
                <button onclick="triggerHaptic(); switchTab('sell')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-xl font-bold text-xs shadow-md transition">➕ Post New Car</button>
                <button onclick="triggerHaptic(); logout()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2.5 rounded-xl font-bold text-xs transition border border-slate-700">Log Out</button>
            </div>
        </section>

        <!-- Sell / Edit Form Section -->
        <section id="form-section" class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl hidden space-y-4">
            <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                <h2 id="form-heading" class="text-lg font-bold text-white">🚗 Sell Your Car</h2>
                <button type="button" id="cancel-edit-btn" onclick="triggerHaptic(); switchTab('feed')" class="hidden text-xs bg-slate-800 text-slate-300 px-2.5 py-1.5 rounded-lg hover:bg-slate-700 font-semibold transition">Cancel</button>
            </div>
            
            <form id="car-form" class="space-y-4">
                <input type="hidden" id="edit-listing-id" value="">
                
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Brand (Type)</label>
                    <input type="text" id="car-brand" placeholder="e.g., Toyota, Honda..." required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Car Name / Model (Type)</label>
                    <input type="text" id="car-title" placeholder="e.g., Crown Athlete, Probox..." required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Model Year</label>
                        <input type="text" id="car-year" placeholder="e.g., 2004" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Color</label>
                        <input type="text" id="car-color" placeholder="e.g., Pearl White" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Made in</label>
                        <select id="car-country" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-blue-500 transition">
                            <option value="Japan">Japan</option>
                            <option value="Thailand">Thailand</option>
                            <option value="China">China</option>
                            <option value="USA">USA</option>
                            <option value="Germany">Germany</option>
                            <option value="South Korea">South Korea</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Mileage</label>
                        <input type="text" id="car-mileage" placeholder="e.g., 85,000 km" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Price</label>
                    <input type="text" id="car-price" placeholder="e.g., $15,000 or 15000" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                </div>

                <div class="border-t border-slate-800 pt-4 space-y-3">
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider">📱 Contact Info (Fill at least one)</label>
                    <div>
                        <label class="block text-[11px] font-medium text-slate-400 mb-1">Phone Number</label>
                        <input type="text" id="car-phone" placeholder="e.g., 09-912345678" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-slate-400 mb-1">Viber Number</label>
                        <input type="text" id="car-viber" placeholder="e.g., 09-912345678" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-slate-400 mb-1">Telegram Username / Number</label>
                        <input type="text" id="car-telegram" placeholder="e.g., @username" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div class="border-t border-slate-800 pt-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">Photos (Up to 10)</label>
                        <span id="photo-count-indicator" class="text-xs text-slate-400 font-semibold">0 / 10</span>
                    </div>
                    
                    <div id="current-images-preview" class="grid grid-cols-4 gap-2 mb-3"></div>

                    <input type="file" id="car-images" accept="image/*" multiple class="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-600/10 file:text-blue-400 hover:file:bg-blue-600/20 transition cursor-pointer">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Description</label>
                    <textarea id="car-desc" rows="3" placeholder="Condition, license details..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition"></textarea>
                </div>

                <button type="submit" id="form-submit-btn" onclick="triggerHaptic()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-600/20 transition">Post Live Listing</button>
            </form>
        </section>

        <!-- Search & Filter Section -->
        <section id="search-section" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl space-y-3">
            <div class="relative flex gap-2">
                <input type="text" id="search-input" placeholder="🔍 Search Cars or Showroom Name..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition">
                <button onclick="triggerHaptic(); saveCurrentSearch()" class="bg-slate-800 hover:bg-slate-700 text-blue-400 border border-slate-700 px-3.5 rounded-xl text-xs font-bold transition whitespace-nowrap shadow-sm" title="Save this search filter & alert">🔔 Save Alert</button>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="filter-brand" placeholder="Filter by Brand..." class="bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition">
                <select id="filter-country" onchange="triggerHaptic()" class="bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-blue-500 transition">
                    <option value="">All Countries</option>
                    <option value="Japan">Japan</option>
                    <option value="Thailand">Thailand</option>
                    <option value="China">China</option>
                    <option value="USA">USA</option>
                    <option value="Germany">Germany</option>
                    <option value="South Korea">South Korea</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div id="saved-searches-bar" class="flex flex-wrap gap-1.5 pt-1"></div>
        </section>

        <!-- Feed Header -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 id="feed-title" class="text-lg font-bold text-slate-100">📋 Available Cars (FYP)</h2>
                <button onclick="triggerHaptic(); fetchCloudData()" class="text-xs bg-slate-900 border border-slate-800 text-blue-400 px-3 py-1.5 rounded-xl font-semibold hover:bg-slate-800 transition shadow-sm">🔄 Refresh</button>
            </div>
            <div id="listings-container" class="space-y-4"></div>
        </section>
    </main>

    <!-- Fullscreen Facebook-Style Photo Lightbox -->
    <div id="fb-photo-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-50 hidden flex flex-col justify-between select-none">
        <div class="flex justify-between items-center p-4 bg-slate-900/60 border-b border-slate-800 text-white z-10">
            <span id="fb-modal-counter" class="text-xs font-semibold text-slate-300 tracking-wider">1 / 1</span>
            <button onclick="triggerHaptic(); closeFbPhotoModal()" class="w-9 h-9 bg-slate-800 hover:bg-slate-700 rounded-full flex items-center justify-center text-sm font-bold text-slate-200 transition">✕</button>
        </div>

        <div class="relative flex-1 flex items-center justify-center overflow-hidden px-2">
            <button id="fb-prev-btn" onclick="triggerHaptic(); changeFbModalSlide(-1)" class="absolute left-3 bg-slate-900/80 hover:bg-slate-800 text-white w-10 h-10 rounded-full flex items-center justify-center text-lg z-10 border border-slate-700 transition">‹</button>
            <img id="fb-modal-img" src="" class="max-h-full max-w-full object-contain transition-transform duration-200" alt="Full Image">
            <button id="fb-next-btn" onclick="triggerHaptic(); changeFbModalSlide(1)" class="absolute right-3 bg-slate-900/80 hover:bg-slate-800 text-white w-10 h-10 rounded-full flex items-center justify-center text-lg z-10 border border-slate-700 transition">›</button>
        </div>

        <div id="fb-modal-thumbs" class="p-3 bg-slate-900/80 border-t border-slate-800 flex items-center justify-center space-x-2 overflow-x-auto min-h-[72px]"></div>
    </div>

    <!-- Premium Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-xl border-t border-slate-800 shadow-2xl z-40">
        <div class="max-w-md mx-auto grid grid-cols-4 h-16">
            <button onclick="triggerHaptic(); switchTab('feed')" id="nav-btn-feed" class="flex flex-col items-center justify-center text-blue-400 font-bold transition">
                <span class="text-xl">🏠</span>
                <span class="text-[10px] mt-1 font-semibold tracking-wider">Feed</span>
            </button>
            <button onclick="triggerHaptic(); switchTab('profile')" id="nav-btn-profile" class="flex flex-col items-center justify-center text-slate-500 font-medium hover:text-slate-300 transition">
                <span class="text-xl">👤</span>
                <span class="text-[10px] mt-1 font-semibold tracking-wider">Dashboard</span>
            </button>
            <button onclick="triggerHaptic(); switchTab('sell')" id="nav-btn-sell" class="flex flex-col items-center justify-center text-slate-500 font-medium hover:text-slate-300 transition">
                <span class="text-xl">➕</span>
                <span class="text-[10px] mt-1 font-semibold tracking-wider">Sell Car</span>
            </button>
            <button onclick="triggerHaptic(); switchTab('saved')" id="nav-btn-saved" class="flex flex-col items-center justify-center text-slate-500 font-medium hover:text-slate-300 transition relative">
                <span class="text-xl">❤️</span>
                <span class="text-[10px] mt-1 font-semibold tracking-wider">Saved <span id="nav-badge" class="text-[9px] text-blue-400"></span></span>
            </button>
        </div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://ujdwilbpkzrinbammmfi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_I34WJ4psecMdoTTyaDxHfw_WFsLvk9w';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'feed';
        let activeEditImages = [];
        let cloudListings = [];
        let profilesMap = {}; // Maps user_id -> showroom_name
        let currentModalImages = [];
        let currentModalIndex = 0;
        
        let currentUser = null;

        function triggerHaptic() {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            } else {
                try {
                    let switchInput = document.createElement('input');
                    switchInput.type = 'checkbox';
                    switchInput.style.display = 'none';
                    document.body.appendChild(switchInput);
                    switchInput.click();
                    switchInput.remove();
                } catch(e) {}
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
            updateAuthUI();

            supabaseClient.auth.onAuthStateChange((_event, session) => {
                currentUser = session?.user || null;
                updateAuthUI();
                renderFilteredListings();
            });

            switchTab('feed');
            updateWishlistCount();
            renderImagePreviews();
            renderSavedSearchesBar();
            await fetchCloudData();
        });

        function updateAuthUI() {
            const authContainer = document.getElementById('auth-container');
            if (currentUser) {
                const meta = currentUser.user_metadata || {};
                const avatar = meta.avatar_url || meta.picture;
                let avatarHtml = avatar ? `<img src="${avatar}" class="w-7 h-7 rounded-full border border-slate-700 object-cover">` : `<div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold text-white">👤</div>`;
                
                authContainer.innerHTML = `
                    <button onclick="switchTab('profile')" class="flex items-center gap-1.5 bg-slate-800/80 border border-slate-700 px-2.5 py-1 rounded-full text-xs font-semibold text-slate-200 hover:bg-slate-700 transition shadow-sm">
                        ${avatarHtml}
                        <span class="max-w-[80px] truncate">${meta.full_name || meta.name || 'My Profile'}</span>
                    </button>
                    <button onclick="logout()" class="text-[11px] bg-slate-900 text-slate-400 border border-slate-800 px-2.5 py-1.5 rounded-full font-semibold hover:text-white transition">
                        ✕
                    </button>
                `;
            } else {
                authContainer.innerHTML = `
                    <button onclick="loginWithGoogle()" class="text-[11px] bg-white text-slate-900 border border-slate-200 px-3.5 py-1.5 rounded-full font-bold shadow-sm hover:bg-slate-200 flex items-center gap-1.5 transition">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                        Sign in
                    </button>
                `;
            }
        }

        async function loginWithGoogle() {
            triggerHaptic();
            await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
        }

        async function logout() {
            triggerHaptic();
            await supabaseClient.auth.signOut();
            switchTab('feed'); 
        }

        function switchTab(tab) {
            if ((tab === 'sell' || tab === 'profile') && !currentUser) {
                triggerHaptic();
                alert('Please sign in with Google to access this feature.');
                loginWithGoogle();
                return;
            }

            currentTab = tab;
            
            const formSection = document.getElementById('form-section');
            const searchSection = document.getElementById('search-section');
            const welcomeBanner = document.getElementById('welcome-banner');
            const dashboardSection = document.getElementById('dashboard-section');
            const feedTitle = document.getElementById('feed-title');
            const headerSubtitle = document.getElementById('header-subtitle');

            document.getElementById('nav-btn-feed').className = "flex flex-col items-center justify-center text-slate-500 font-medium transition";
            document.getElementById('nav-btn-profile').className = "flex flex-col items-center justify-center text-slate-500 font-medium transition";
            document.getElementById('nav-btn-sell').className = "flex flex-col items-center justify-center text-slate-500 font-medium transition";
            document.getElementById('nav-btn-saved').className = "flex flex-col items-center justify-center text-slate-500 font-medium transition";

            if (tab === 'feed') {
                document.getElementById('nav-btn-feed').className = "flex flex-col items-center justify-center text-blue-400 font-bold transition";
                formSection.classList.add('hidden');
                dashboardSection.classList.add('hidden');
                searchSection.classList.remove('hidden');
                welcomeBanner.classList.remove('hidden');
                feedTitle.innerText = "📋 Available Cars (FYP)";
                headerSubtitle.innerText = "LIVE CLOUD";
                renderFilteredListings();
            } else if (tab === 'profile') {
                document.getElementById('nav-btn-profile').className = "flex flex-col items-center justify-center text-blue-400 font-bold transition";
                formSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                searchSection.classList.add('hidden');
                welcomeBanner.classList.add('hidden');
                feedTitle.innerText = "👤 Your Profile Posts";
                headerSubtitle.innerText = "DASHBOARD";
                updateProfileDashboardData();
                renderFilteredListings();
            } else if (tab === 'sell') {
                document.getElementById('nav-btn-sell').className = "flex flex-col items-center justify-center text-blue-400 font-bold transition";
                formSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                searchSection.classList.add('hidden');
                welcomeBanner.classList.add('hidden');
                feedTitle.innerText = "🚗 Manage Your Listing";
                headerSubtitle.innerText = "POST / EDIT";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (tab === 'saved') {
                document.getElementById('nav-btn-saved').className = "flex flex-col items-center justify-center text-blue-400 font-bold transition";
                formSection.classList.add('hidden');
                dashboardSection.classList.add('hidden');
                searchSection.classList.add('hidden');
                welcomeBanner.classList.add('hidden');
                feedTitle.innerText = "❤️ Your Saved Cars";

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    const MAX_DIMENSION = 800;
                    if (width > height) {
                        if (width > MAX_DIMENSION) {
                            height *= MAX_DIMENSION / width;
                            width = MAX_DIMENSION;
                        }
                    } else {
                        if (height > MAX_DIMENSION) {
                            width *= MAX_DIMENSION / height;
                            height = MAX_DIMENSION;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        document.getElementById('car-images').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            if (activeEditImages.length + files.length > 10) {
                alert('Maximum limit is 10 photos total.');
                e.target.value = '';
                return;
            }

            let loadedCount = 0;
            files.forEach((file) => {
                compressImage(file, (compressedDataUrl) => {
                    activeEditImages.push(compressedDataUrl);
                    loadedCount++;
                    if (loadedCount === files.length) {
                        renderImagePreviews();
                        e.target.value = '';
                    }
                });
            });
        });

        window.changeSlide = function(id, direction) {
            let item = cloudListings.find(l => String(l.id) === String(id));
            if (!item || !item.img_srcs || item.img_srcs.length <= 1) return;

            let imgElement = document.getElementById(`img-${id}`);
            let counterElement = document.getElementById(`counter-${id}`);
            
            let currentImages = item.img_srcs;
            let currentSrc = imgElement.src;
            let currentIndex = currentImages.indexOf(currentSrc);

            let newIndex = currentIndex + direction;
            if (newIndex >= currentImages.length) newIndex = 0;
            if (newIndex < 0) newIndex = currentImages.length - 1;

            imgElement.src = currentImages[newIndex];
            if (counterElement) counterElement.innerText = newIndex + 1;
        }

        window.openFbPhotoModal = function(id, index = 0) {
            let item = cloudListings.find(l => String(l.id) === String(id));
            if (!item || !item.img_srcs || item.img_srcs.length === 0) return;

            let imgElement = document.getElementById(`img-${id}`);
            if (imgElement) {
                let currentSrc = imgElement.src;
                let foundIdx = item.img_srcs.indexOf(currentSrc);
                if (foundIdx !== -1) index = foundIdx;
            }

            currentModalImages = item.img_srcs;
            currentModalIndex = index;

            const modal = document.getElementById('fb-photo-modal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            updateFbModalDisplay();
        }

        function closeFbPhotoModal() {

            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.changeFbModalSlide = function(direction) {
            currentModalIndex += direction;
            if (currentModalIndex >= currentModalImages.length) currentModalIndex = 0;
            if (currentModalIndex < 0) currentModalIndex = currentModalImages.length - 1;
            updateFbModalDisplay();
        }

        function updateFbModalDisplay() {
            const modalImg = document.getElementById('fb-modal-img');
            const counter = document.getElementById('fb-modal-counter');
            const thumbsContainer = document.getElementById('fb-modal-thumbs');
            const prevBtn = document.getElementById('fb-prev-btn');
            const nextBtn = document.getElementById('fb-next-btn');

            modalImg.src = currentModalImages[currentModalIndex];
            counter.innerText = `${currentModalIndex + 1} / ${currentModalImages.length}`;

            if (currentModalImages.length <= 1) {
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
                thumbsContainer.classList.add('hidden');
            } else {
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
                thumbsContainer.classList.remove('hidden');

                thumbsContainer.innerHTML = '';
                currentModalImages.forEach((src, idx) => {
                    const thumb = document.createElement('img');
                    thumb.src = src;
                    thumb.className = `w-12 h-12 object-cover rounded-lg cursor-pointer transition-all border ${idx === currentModalIndex ? 'border-blue-500 scale-105 opacity-100 shadow-md' : 'border-slate-800 opacity-50 hover:opacity-100'}`;
                    thumb.onclick = () => {
                        triggerHaptic();
                        currentModalIndex = idx;
                        updateFbModalDisplay();
                    };
                    thumbsContainer.appendChild(thumb);
                });
            }
        }

                cloudListings = cloudListings.filter(item => String(item.id) !== String(id));

                let favKey = `carFavorites_${currentUser.id}`;
                let favorites = (JSON.parse(localStorage.getItem(favKey)) || []).map(String);
                favorites = favorites.filter(favId => favId !== String(id));
                localStorage.setItem(favKey, JSON.stringify(favorites));

                if (currentTab === 'profile') updateProfileDashboardData();
                renderFilteredListings();
                updateWishlistCount();
                alert('Listing deleted successfully.');
            } catch (err) {
                console.error(err);
                alert('Failed to delete listing.');
            }
        }

        document.getElementById('search-input').addEventListener('input', () => renderFilteredListings());
        document.getElementById('filter-brand').addEventListener('input', () => renderFilteredListings());
        document.getElementById('filter-country').addEventListener('change', () => renderFilteredListings());
    </script>
</body>
</html>
