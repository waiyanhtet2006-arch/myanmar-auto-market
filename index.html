<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Auto Market - ကားအရောင်းအဝယ်</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans">
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🚗 Myanmar Auto Market</h1>
            <button onclick="toggleView()" id="view-toggle-btn" class="text-sm bg-blue-700 px-3 py-1.5 rounded-md font-semibold hover:bg-blue-800">❤️ Saved (0)</button>
        </div>
    </header>
    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <h2 class="text-lg font-semibold text-gray-800">Welcome! ကြိုဆိုပါတယ်</h2>
            <p class="text-sm text-gray-600">The most Burmese-friendly car marketplace platform.</p>
        </div>

        <!-- Car Listing Form Section -->
        <section id="form-section" class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 text-gray-800">🚗 Sell Your Car</h2>
            <form id="car-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Car Make & Model</label>
                    <input type="text" id="car-title" placeholder="e.g., Toyota Crown" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Brand</label>
                        <select id="car-brand" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm bg-white">
                            <option value="Toyota">Toyota</option>
                            <option value="Honda">Honda</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Mazda">Mazda</option>
                            <option value="Suzuki">Suzuki</option>
                            <option value="Ford">Ford</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Year</label>
                        <input type="number" id="car-year" min="1980" max="2026" placeholder="2018" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Country Made</label>
                    <select id="car-country" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-sm bg-white">
                        <option value="Japan">Japan</option>
                        <option value="Thailand">Thailand</option>
                        <option value="China">China</option>
                        <option value="USA">USA</option>
                        <option value="Germany">Germany</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Price (USD / MMK)</label>
                    <input type="text" id="car-price" placeholder="e.g., $15,000" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Upload Photo</label>
                    <input type="file" id="car-image" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="car-desc" rows="3" placeholder="Condition, mileage, contact info..." class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700">Post Listing</button>
            </form>
        </section>

        <!-- Search & Advanced Filter Section -->
        <section id="search-section" class="bg-white p-4 rounded-lg shadow-md space-y-3">
            <input type="text" id="search-input" placeholder="🔍 General Search (e.g., Crown, Probox)..." class="w-full p-2 border border-gray-300 rounded-md text-sm">
            
            <div class="grid grid-cols-3 gap-2">
                <select id="filter-brand" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Brands</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Honda">Honda</option>
                    <option value="Nissan">Nissan</option>
                    <option value="Mazda">Mazda</option>
                    <option value="Suzuki">Suzuki</option>
                    <option value="Ford">Ford</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-country" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Countries</option>
                    <option value="Japan">Japan</option>
                    <option value="Thailand">Thailand</option>
                    <option value="China">China</option>
                    <option value="USA">USA</option>
                    <option value="Germany">Germany</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-year" class="p-1.5 border border-gray-300 rounded-md text-xs bg-white">
                    <option value="">All Years</option>
                    <option value="2020-2026">2020 - 2026</option>
                    <option value="2010-2019">2010 - 2019</option>
                    <option value="2000-2009">2000 - 2009</option>
                    <option value="1980-1999">1980 - 1999</option>
                </select>
            </div>
        </section>

        <!-- Marketplace Feed Section -->
        <section class="space-y-4">
            <h2 id="feed-title" class="text-xl font-bold text-gray-800">📋 Available Cars</h2>
            <div id="listings-container" class="space-y-4">
                <!-- Dynamic listings will appear here -->
            </div>
        </section>
    </main>

    <script>
        let showFavoritesOnly = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadListings();
            updateWishlistCount();
        });

        document.getElementById('car-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('car-title').value;
            const brand = document.getElementById('car-brand').value;
            const year = document.getElementById('car-year').value;
            const country = document.getElementById('car-country').value;
            const price = document.getElementById('car-price').value;
            const desc = document.getElementById('car-desc').value;
            const imageInput = document.getElementById('car-image');

            let imageSrc = 'https://via.placeholder.com/400x200?text=No+Image';
            
            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveListing(title, brand, year, country, price, desc, e.target.result);
                }
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                saveListing(title, brand, year, country, price, desc, imageSrc);
            }
        });

        function saveListing(title, brand, year, country, price, desc, imgSrc) {
            const newListing = { id: Date.now(), title, brand, year, country, price, desc, imgSrc };
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            listings.unshift(newListing);
            localStorage.setItem('carListings', JSON.stringify(listings));

            document.getElementById('car-form').reset();
            loadListings();
            alert('Listing posted successfully!');
        }

        function loadListings() {
            const container = document.getElementById('listings-container');
            container.innerHTML = '';
            
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];

            if (showFavoritesOnly) {
                listings = listings.filter(item => favorites.includes(item.id));
            }

            // Get filter values
            const query = document.getElementById('search-input').value.toLowerCase();
            const selectedBrand = document.getElementById('filter-brand').value;
            const selectedCountry = document.getElementById('filter-country').value;
            const selectedYearRange = document.getElementById('filter-year').value;

            const filtered = listings.filter(item => {
                // General text search (matches title, brand, or country)
                const matchesQuery = item.title.toLowerCase().includes(query) || 
                                     item.brand.toLowerCase().includes(query) || 
                                     item.country.toLowerCase().includes(query);
                
                // Dropdown filters
                const matchesBrand = !selectedBrand || item.brand === selectedBrand;
                const matchesCountry = !selectedCountry || item.country === selectedCountry;
                
                let matchesYear = true;
                if (selectedYearRange) {
                    const [minY, maxY] = selectedYearRange.split('-').map(Number);
                    matchesYear = Number(item.year) >= minY && Number(item.year) <= maxY;
                }

                return matchesQuery && matchesBrand && matchesCountry && matchesYear;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-500 text-center py-4">${showFavoritesOnly ? 'No saved cars yet.' : 'No cars found matching your criteria.'}</p>`;
                return;
            }

            filtered.forEach(item => {
                const isFav = favorites.includes(item.id);
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-lg shadow-md space-y-2 relative";
                card.innerHTML = `
                    <div class="relative">
                        <img src="${item.imgSrc}" class="w-full h-48 object-cover rounded-md">
                        <button onclick="toggleFavorite(${item.id})" class="absolute top-2 right-2 bg-white p-2 rounded-full shadow-md text-lg hover:scale-110 transition">
                            ${isFav ? '❤️' : '🤍'}
                        </button>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800">${item.title} (${item.year})</h3>
                    <p class="text-xs text-gray-500">🏭 Brand: <span class="font-semibold text-gray-700">${item.brand}</span> | 🌐 Made in: <span class="font-semibold text-gray-700">${item.country}</span></p>
                    <p class="text-blue-600 font-semibold">${item.price}</p>
                    <p class="text-sm text-gray-600">${item.desc}</p>
                    <button onclick="deleteListing(${item.id})" class="w-full bg-red-100 text-red-600 text-sm font-semibold py-2 rounded-md hover:bg-red-200 mt-2">🗑️ Mark as Sold / Delete</button>
                `;
                container.appendChild(card);
            });
        }

        function toggleFavorite(id) {
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('carFavorites', JSON.stringify(favorites));
            loadListings();
            updateWishlistCount();
        }

        function updateWishlistCount() {
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            document.getElementById('view-toggle-btn').innerText = showFavoritesOnly ? '📋 All Cars' : `❤️ Saved (${favorites.length})`;
        }

        function toggleView() {
            showFavoritesOnly = !showFavoritesOnly;
            document.getElementById('form-section').style.display = showFavoritesOnly ? 'none' : 'block';
            document.getElementById('search-section').style.display = showFavoritesOnly ? 'none' : 'block';
            document.getElementById('feed-title').innerText = showFavoritesOnly ? '❤️ Your Saved Cars' : '📋 Available Cars';
            loadListings();
            updateWishlistCount();
        }

        function deleteListing(id) {
            let listings = JSON.parse(localStorage.getItem('carListings')) || [];
            listings = listings.filter(item => item.id !== id);
            localStorage.setItem('carListings', JSON.stringify(listings));
            
            let favorites = JSON.parse(localStorage.getItem('carFavorites')) || [];
            favorites = favorites.filter(favId => favId !== id);
            localStorage.setItem('carFavorites', JSON.stringify(favorites));

            loadListings();
            updateWishlistCount();
        }

        // Event listeners for filters and search
        document.getElementById('search-input').addEventListener('input', loadListings);
        document.getElementById('filter-brand').addEventListener('change', loadListings);
        document.getElementById('filter-country').addEventListener('change', loadListings);
        document.getElementById('filter-year').addEventListener('change', loadListings);
    </script>
</body>
</html>
